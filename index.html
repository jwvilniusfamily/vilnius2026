    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VILNIUS 2026</title>
    
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandPink: '#EF92A4',
                        brandGold: '#D4A373',
                        brandNavy: '#1A2238',
                        brandCream: '#FAF9F6',
                        brandGreen: '#1A4D2E'
                    },
                    fontFamily: {
                        serif: ['Merriweather', 'serif'],
                        sans: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FAF9F6;
            color: #1A2238;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-serif {
            font-family: 'Merriweather', serif;
        }
        .gallery-image-wrapper {
            transition: transform 0.3s ease, opacity 0.5s ease;
            animation: fadeIn 0.5s forwards;
            overflow: hidden;
            border-radius: 0.5rem;
            background-color: #e5e7eb;
            aspect-ratio: 1;
        }
        .gallery-image-wrapper:hover img {
            transform: scale(1.05);
        }
        .gallery-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden-item { display: none; }
        .message-card { border-left: 4px solid #EF92A4; }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <section class="w-full px-6 md:px-12 mb-20 max-w-7xl mx-auto">

                    <div>

                        <input type="text" id="guestName" required class="w-full p-3 rounded bg-brandCream text-brandNavy border-none focus:ring-2 focus:ring-brandPink">
                    </div>
                    <div>
                        <label class="block text-sm mb-1" data-i18n="formCountry"></label>
                        <select id="guestCountry" required class="w-full p-3 rounded bg-brandCream text-brandNavy border-none focus:ring-2 focus:ring-brandPink"></select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm mb-1" data-i18n="formMessage"></label>
                    <textarea id="guestMessage" required rows="3" class="w-full p-3 rounded bg-brandCream text-brandNavy border-none focus:ring-2 focus:ring-brandPink"></textarea>
                </div>
                <button type="submit" class="self-start px-8 py-3 bg-brandGold text-brandNavy font-semibold rounded hover:bg-brandGold/90 transition-colors" data-i18n="formSubmit"></button>

        </div>

    <footer class="w-full bg-brandCream py-12 px-6 border-t border-brandGold/20 mt-auto">

            <div class="flex flex-col items-start gap-2 w-full md:w-1/2">
                <span class="font-serif font-bold text-brandNavy mb-2" data-i18n="qrTitle"></span>
                <div class="flex w-full gap-2">
                    <input type="url" id="qrInput" class="flex-1 p-2 border border-brandNavy/20 rounded focus:outline-none focus:border-brandPink" data-i18n-ph="qrPlaceholder">
                    <button id="qrBtn" class="bg-brandGreen text-brandCream px-4 py-2 rounded hover:bg-brandGreen/90 transition-colors whitespace-nowrap" data-i18n="qrButton"></button>

        let currentLang = 'lt';

            { type: 'atvirukai', url: 'https://placehold.co/600x600/FAF9F6/EF92A4?text=Atvirukas+5' }
        ];

        function applyTranslations(lang) {
            currentLang = lang;
            const dict = translations[lang];
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.textContent = dict[key];
            });

            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                if (dict[key]) el.setAttribute('placeholder', dict[key]);
            });

            const countrySelect = document.getElementById('guestCountry');
            const currentVal = countrySelect.value;
            countrySelect.innerHTML = '';
            for (const [code, name] of Object.entries(dict.countries)) {
                const opt = document.createElement('option');
                opt.value = code;
                opt.textContent = name;
                countrySelect.appendChild(opt);
            }
            if (currentVal && dict.countries[currentVal]) {
                countrySelect.value = currentVal;
            }
            
            renderMessages();
        }

        function initGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            galleryItems.forEach(item => {
                const div = document.createElement('div');
                div.className = `gallery-image-wrapper ${item.type}`;
                div.innerHTML = `<img src="${item.url}" loading="lazy" alt="${item.type}">`;
                grid.appendChild(div);
            });
            
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    buttons.forEach(b => {
                        b.classList.remove('bg-brandPink', 'text-white');
                        b.classList.add('bg-transparent', 'text-brandPink');
                    });
                    e.target.classList.remove('bg-transparent', 'text-brandPink');
                    e.target.classList.add('bg-brandPink', 'text-white');
                    
                    const filter = e.target.getAttribute('data-filter');
                    const items = grid.querySelectorAll('.gallery-image-wrapper');
                    
                    items.forEach(el => {
                        if (filter === 'all' || el.classList.contains(filter)) {
                            el.classList.remove('hidden-item');
                        } else {
                            el.classList.add('hidden-item');
                        }
                    });
                });
            });
        }

        /* 
         * LocalStorage Architecture for Guestbook:
         * Data is stored locally in user's browser under key 'v2026_messages'.
         */
        function handleGuestbook() {
            const form = document.getElementById('guestForm');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('guestName').value.trim();
                const countryCode = document.getElementById('guestCountry').value;
                const message = document.getElementById('guestMessage').value.trim();
                
                if (!name || !message) return;
                
                const msgs = JSON.parse(localStorage.getItem('v2026_messages') || '[]');
                msgs.unshift({ name, countryCode, message, date: new Date().toISOString() });
                localStorage.setItem('v2026_messages', JSON.stringify(msgs));
                
                form.reset();
                renderMessages();
            });
        }

        function renderMessages() {
            const container = document.getElementById('guestMessages');
            container.innerHTML = '';
            const msgs = JSON.parse(localStorage.getItem('v2026_messages') || '[]');
            
            msgs.forEach(msg => {
                const countryName = translations[currentLang].countries[msg.countryCode] || msg.countryCode;
                const dateObj = new Date(msg.date);
                const dateStr = dateObj.toLocaleDateString(currentLang);
                const timeStr = dateObj.toLocaleTimeString(currentLang, { hour: '2-digit', minute: '2-digit' });
                
                const div = document.createElement('div');
                div.className = 'message-card bg-brandCream text-brandNavy p-4 rounded shadow-sm';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <strong class="font-serif">${msg.name} <span class="text-brandGold text-sm font-sans font-normal ml-2">🌍 ${countryName}</span></strong>
                        <span class="text-xs text-brandNavy/50">${dateStr} ${timeStr}</span>
                    </div>
                    <p class="text-sm leading-relaxed">${msg.message}</p>
                `;
                container.appendChild(div);
            });
        }

        function setupQR() {
            document.getElementById('qrBtn').addEventListener('click', () => {
                const url = document.getElementById('qrInput').value.trim();
                if (url) {
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}`;
                    document.getElementById('qrImage').src = qrUrl;
                    document.getElementById('qrResult').classList.remove('hidden');
                }
            });
        }

        document.getElementById('langSwitcher').addEventListener('change', (e) => {
            applyTranslations(e.target.value);
        });

        document.addEventListener('DOMContentLoaded', () => {
            applyTranslations('lt');
            initGallery();
            handleGuestbook();
            renderMessages();
            setupQR();
        });
    </script>
</body>
