        wsTitle: "ברוכים הבאים!", wsDesc: "בחר את ההעדפות שלך", wsCountryLabel: "מדינה", wsLangLabel: "שפה", wsSizeLabel: "גודל טקסט", wsSizeNormal: "רגיל", wsSizeLarge: "גדול", btnContinue: "המשך", wsPrivacy: "מדיניות פרטיות", wsTerms: "תנאי שימוש",
        wsAcceptText: "אני מסכים ל", wsAnd: "ו", translatedFrom: "תורגם מ", loading: "טוען...", noComments: "עדיין אין תגובות. היה הראשון!", docBtnClose: "הבנתי"

        btnExplore: "写真", btnLeaveMessage: "手紙", galleryTitle: "舞台裏",

        commentsTitle: "手紙", commentsDesc: "温かい言葉を残してください。",
        labelName: "あなたの名前", labelMsg: "メッセージ", btnSubmitComment: "送信",
        commentsSub: "コメント", labelTranslateOn: "AI翻訳が有効です",
        wsTitle: "ようこそ！", wsDesc: "設定を選択してください", wsCountryLabel: "国", wsLangLabel: "言語", wsSizeLabel: "テキストサイズ", wsSizeNormal: "標準", wsSizeLarge: "大", btnContinue: "続行", wsPrivacy: "プライバシーポリシー", wsTerms: "利用規約",
        wsAcceptText: "同意します", wsAnd: "と", translatedFrom: "翻訳元", loading: "読み込み中...", noComments: "まだコメントはありません。最初のコメントをどうぞ！", docBtnClose: "理解しました"
      },
      FR: {

        btnExplore: "Photos", btnLeaveMessage: "Lettre", galleryTitle: "Dans les coulisses",
        catBtnAll: "Tout", catBtnPosters: "Affiches", catBtnClay: "Argile", catBtnCards: "Cartes",
        commentsTitle: "Lettre", commentsDesc: "S'il vous plaît, laissez-nous quelques mots chaleureux.",
        labelName: "Votre Nom", labelMsg: "Message", btnSubmitComment: "Envoyer",
        commentsSub: "Commentaires", labelTranslateOn: "Traduction AI Active",
        wsTitle: "Bienvenue !", wsDesc: "Choisissez vos préférences", wsCountryLabel: "Pays", wsLangLabel: "Langue", wsSizeLabel: "Taille du texte", wsSizeNormal: "Normal", wsSizeLarge: "Grand", btnContinue: "Continuer", wsPrivacy: "Politique de confidentialité", wsTerms: "Conditions d'utilisation",
        wsAcceptText: "J'accepte la", wsAnd: "et les", translatedFrom: "Traduit de", loading: "Chargement...", noComments: "Aucun commentaire pour le moment. Soyez le premier !", docBtnClose: "J'ai compris"
      },
      SV: {
        heroDesc: "Välkomna, kära bröder och systrar i vår internationella andliga familj! Vi är oerhört glada att ni kom till kongressen i Litauen. Vi har förberett dessa gåvor speciellt för er med stor kärlek. Lämna gärna några varma ord till oss!",
        btnExplore: "Foton", btnLeaveMessage: "Brev", galleryTitle: "Bakom kulisserna",
        catBtnAll: "Allt", catBtnPosters: "Affischer", catBtnClay: "Lera", catBtnCards: "Vykort",
        commentsTitle: "Brev", commentsDesc: "Lämna gärna några varma ord till oss.",
        labelName: "Ditt Namn", labelMsg: "Meddelande", btnSubmitComment: "Skicka",
        commentsSub: "Kommentarer", labelTranslateOn: "AI-översättning aktiv",
        wsTitle: "Välkommen!", wsDesc: "Välj dina inställningar", wsCountryLabel: "Land", wsLangLabel: "Språk", wsSizeLabel: "Textstorlek", wsSizeNormal: "Normal", wsSizeLarge: "Stor", btnContinue: "Fortsätt", wsPrivacy: "Integritetspolicy", wsTerms: "Användarvillkor",
        wsAcceptText: "Jag godkänner", wsAnd: "och", translatedFrom: "Översatt från", loading: "Laddar...", noComments: "Inga kommentarer ännu. Bli den första!", docBtnClose: "Jag förstår"
      }
    };

    const DOCS = {
      privacy: {
        LT: { title: "Privatumo politika", text: "<p>Ši svetainė naudoja vietinę atmintį, kad išsaugotų jūsų pasirinktą kalbą, šalį ir teksto dydį.</p><p>Jūsų vardas, šalis ir komentarai yra saugomi saugioje duomenų bazėje (Firebase) ir rodomi kitiems lankytojams.</p><p>Duomenys nenaudojami komerciniais tikslais ir neperduodami trečiosioms šalims.</p>" },
        EN: { title: "Privacy Policy", text: "<p>This site uses local storage to save your language, country, and text size preferences.</p><p>Your name, country, and comments are stored in a secure database (Firebase) to be displayed to other visitors.</p><p>Data is not used for commercial purposes or shared with third parties.</p>" },
        RU: { title: "Политика конфиденциальности", text: "<p>Этот сайт использует локальное хранилище для сохранения выбранного языка, страны и размера текста.</p><p>Ваше имя, страна и комментарии сохраняются в безопасной базе данных (Firebase) для отображения другим посетителям.</p><p>Данные не используются в коммерческих целях и не передаются третьим лицам.</p>" },
        FR: { title: "Politique de confidentialité", text: "<p>Ce site utilise le stockage local pour enregistrer vos préférences de langue, de pays et de taille de texte.</p><p>Votre nom, votre pays et vos commentaires sont stockés dans une base de données sécurisée (Firebase) pour être affichés aux autres visiteurs.</p><p>Les données ne sont pas utilisées à des fins commerciales ni partagées avec des tiers.</p>" }
      },
      terms: {
        LT: { title: "Naudojimo taisyklės", text: "<p>Visos nuotraukos ir vaizdo įrašai skirti tik asmeniniam peržiūrai.</p><p>Draudžiama publikuoti medžiagą kitose svetainėse ar socialiniuose tinkluose be leidimo.</p><p>Draudžiama naudoti medžiagą komerciniais tikslais.</p>" },
        EN: { title: "Terms of Use", text: "<p>All photos and videos are for personal viewing only.</p><p>It is forbidden to publish materials on other sites or social networks without permission.</p><p>It is forbidden to use materials for commercial purposes.</p>" },
        RU: { title: "Правила использования", text: "<p>Все фотографии и видео предназначены только для личного просмотра.</p><p>Запрещается публиковать материалы на других сайтах или в социальных сетях без разрешения.</p><p>Запрещается использовать материалы в коммерческих целях.</p>" },
        FR: { title: "Conditions d'utilisation", text: "<p>Toutes les photos et vidéos sont destinées à un visionnage personnel uniquement.</p><p>Il est interdit de publier des documents sur d'autres sites ou réseaux sociaux sans autorisation.</p><p>Il est interdit d'utiliser des documents à des fins commerciales.</p>" }
      }
    };

    let prefs = null;
    let currentLang = 'LT';
    let currentCountry = 'Lithuania';
    let currentSize = 'normal';
    let activeCategory = 'all';
    let activeImages = [];
    let modalIndex = 0;
    let userId = localStorage.getItem('vf2026_uid') || ('user_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('vf2026_uid', userId);

    function init() {
      populateCountries();
      const savedPrefs = localStorage.getItem('vf2026_prefs');
      if (!savedPrefs) {
        document.getElementById('welcomeScreen').classList.remove('hide');
        document.getElementById('bodyEl').classList.add('overflow-hidden');
      } else {
        prefs = JSON.parse(savedPrefs);
        document.getElementById('welcomeScreen').classList.add('hide');
        document.getElementById('bodyEl').classList.remove('overflow-hidden');
        applyPrefs();
      }
      renderGallery();
      listenToComments();
    }

    function populateCountries() {
      const sel = document.getElementById('wsCountry');
      sel.innerHTML = '';
      Object.keys(COUNTRIES).sort().forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = `${c} ${COUNTRIES[c].native ? '('+COUNTRIES[c].native+')' : ''}`;
        sel.appendChild(opt);
      });
      if(prefs) sel.value = prefs.country;
    }

    document.getElementById('wsCountry').addEventListener('change', (e) => {
      const c = e.target.value;
      if(COUNTRIES[c] && COUNTRIES[c].lang) {
        document.getElementById('wsLang').value = COUNTRIES[c].lang;
        updateWelcomeScreenLang(COUNTRIES[c].lang);
      }
    });

    document.getElementById('wsLang').addEventListener('change', (e) => {
      updateWelcomeScreenLang(e.target.value);
    });

    document.getElementById('wsAccept').addEventListener('change', (e) => {
      document.getElementById('btnContinue').disabled = !e.target.checked;
    });

    function updateWelcomeScreenLang(lang) {
      const t = TRANSLATIONS[lang] || TRANSLATIONS['EN'];
      document.getElementById('wsTitle').textContent = t.wsTitle;
      document.getElementById('wsDesc').textContent = t.wsDesc;
      document.getElementById('wsCountryLabel').textContent = t.wsCountryLabel;
      document.getElementById('wsLangLabel').textContent = t.wsLangLabel;
      document.getElementById('wsSizeLabel').textContent = t.wsSizeLabel;
      document.getElementById('wsSizeNormal').textContent = t.wsSizeNormal;
      document.getElementById('wsSizeLarge').textContent = t.wsSizeLarge;
      document.getElementById('btnContinue').textContent = t.btnContinue;
      document.getElementById('wsPrivacy').textContent = t.wsPrivacy;
      document.getElementById('wsTerms').textContent = t.wsTerms;
      document.getElementById('wsAcceptText').textContent = t.wsAcceptText;
      document.getElementById('wsAnd').textContent = t.wsAnd;
    }

    document.getElementById('btnContinue').addEventListener('click', () => {
      prefs = {
        country: document.getElementById('wsCountry').value,
        lang: document.getElementById('wsLang').value,
        size: document.getElementById('wsSize').value
      };
      localStorage.setItem('vf2026_prefs', JSON.stringify(prefs));
      document.getElementById('welcomeScreen').classList.add('hide');
      document.getElementById('bodyEl').classList.remove('overflow-hidden');
      applyPrefs();
    });

    window.openSettings = () => {
      document.getElementById('wsCountry').value = currentCountry;
      document.getElementById('wsLang').value = currentLang;
      document.getElementById('wsSize').value = currentSize;
      document.getElementById('wsAccept').checked = true;
      document.getElementById('btnContinue').disabled = false;
      updateWelcomeScreenLang(currentLang);
      document.getElementById('welcomeScreen').classList.remove('hide');
      document.getElementById('bodyEl').classList.add('overflow-hidden');
    };

    window.openDoc = (type) => {
      const lang = document.getElementById('wsLang').value;
      const docData = DOCS[type][lang] || DOCS[type]['EN'];
      document.getElementById('docTitle').textContent = docData.title;
      document.getElementById('docContent').innerHTML = docData.text;
      document.getElementById('docBtnClose').textContent = (TRANSLATIONS[lang] || TRANSLATIONS['EN']).docBtnClose;
      document.getElementById('docModal').classList.remove('hide');
    };

    window.closeDoc = () => {
      document.getElementById('docModal').classList.add('hide');
    };

    function applyPrefs() {
      currentLang = prefs.lang;
      currentCountry = prefs.country;
      currentSize = prefs.size;

      if (currentSize === 'large') document.body.classList.add('text-large');
      else document.body.classList.remove('text-large');

      const t = TRANSLATIONS[currentLang] || TRANSLATIONS['EN'];
      document.getElementById('heroDesc').textContent = t.heroDesc;
      document.getElementById('btnExplore').textContent = t.btnExplore;
      document.getElementById('btnLeaveMessage').textContent = t.btnLeaveMessage;
      document.getElementById('galleryTitle').textContent = t.galleryTitle;
      document.getElementById('catBtnAll').textContent = t.catBtnAll;
      document.getElementById('catBtnPosters').textContent = t.catBtnPosters;
      document.getElementById('catBtnClay').textContent = t.catBtnClay;
      document.getElementById('catBtnCards').textContent = t.catBtnCards;
      document.getElementById('commentsTitle').textContent = t.commentsTitle;
      document.getElementById('commentsDesc').textContent = t.commentsDesc;
      document.getElementById('labelName').textContent = t.labelName;
      document.getElementById('labelMsg').textContent = t.labelMsg;
      document.getElementById('btnSubmitComment').querySelector('span').textContent = t.btnSubmitComment;
      document.getElementById('commentsSub').textContent = t.commentsSub;
      document.getElementById('labelTranslateOn').textContent = t.labelTranslateOn;
      document.getElementById('loadingText').textContent = t.loading;
      
      document.documentElement.lang = currentLang.toLowerCase();
      document.body.style.direction = currentLang === 'HE' ? 'rtl' : 'ltr';
      
      renderCommentsUI();
    }

    window.switchCategory = (cat) => {
      activeCategory = cat;
      ['All', 'Posters', 'Clay', 'Cards'].forEach(c => {
        const btn = document.getElementById('catBtn' + c);
        if(btn) {
          if(c.toLowerCase() === cat || (c==='Cards' && cat==='postcards')) {
            btn.className = "px-5 py-2.5 text-sm uppercase tracking-wider font-bold transition-all text-[#b2533e] border-b-2 border-[#b2533e] whitespace-nowrap";
          } else {
            btn.className = "px-5 py-2.5 text-sm uppercase tracking-wider font-bold transition-all text-[#8e7a68] border-b-2 border-transparent hover:text-[#b2533e] whitespace-nowrap";
          }
        }
      });
      renderGallery();
    };

    function renderGallery() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';
      activeImages = IMAGES.filter(img => activeCategory === 'all' || img.cat === activeCategory);
      
      activeImages.forEach((img, idx) => {
        const div = document.createElement('div');
        div.className = "aspect-[4/5] bg-stone-100 rounded-2xl overflow-hidden relative cursor-pointer group shadow-sm hover:shadow-md transition-all";
        div.onclick = () => openModal(idx);
        div.innerHTML = `
          <img src="${img.url}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
          <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
            <span class="text-white text-xs uppercase tracking-widest bg-black/40 backdrop-blur-sm px-4 py-2 rounded-full border border-white/20">Zoom</span>
          </div>
        `;
        grid.appendChild(div);
      });
    }

    window.openModal = (idx) => {
      modalIndex = idx;
      updateModal();
      document.getElementById('imageModal').classList.remove('hide');
      document.getElementById('imageModal').classList.add('flex');
      document.getElementById('bodyEl').classList.add('overflow-hidden');
      setTimeout(() => {
        document.getElementById('modalImg').classList.remove('scale-95', 'opacity-0');
        document.getElementById('modalImg').classList.add('scale-100', 'opacity-100');
      }, 10);
    };

    window.closeImageModal = () => {
      document.getElementById('modalImg').classList.remove('scale-100', 'opacity-100');
      document.getElementById('modalImg').classList.add('scale-95', 'opacity-0');
      setTimeout(() => {
        document.getElementById('imageModal').classList.add('hide');
        document.getElementById('imageModal').classList.remove('flex');
        document.getElementById('bodyEl').classList.remove('overflow-hidden');
      }, 300);
    };

    window.navigateModal = (dir) => {
      const imgEl = document.getElementById('modalImg');
      imgEl.classList.remove('scale-100', 'opacity-100');
      imgEl.classList.add('scale-95', 'opacity-0');
      
      setTimeout(() => {
        modalIndex += dir;
        if(modalIndex < 0) modalIndex = activeImages.length - 1;
        if(modalIndex >= activeImages.length) modalIndex = 0;
        updateModal();
        imgEl.classList.remove('scale-95', 'opacity-0');
        imgEl.classList.add('scale-100', 'opacity-100');
      }, 200);
    };

    function updateModal() {
      document.getElementById('modalImg').src = activeImages[modalIndex].url;
      document.getElementById('modalIndexIndicator').textContent = `${modalIndex + 1} / ${activeImages.length}`;
    }

    let commentsData = [];

    function listenToComments() {
      const q = query(collection(db, "comments"), orderBy("timestamp", "desc"));
      onSnapshot(q, (snapshot) => {
        commentsData = [];
        snapshot.forEach((doc) => {
          commentsData.push({ id: doc.id, ...doc.data() });
        });
        renderCommentsUI();
      }, (error) => {
        document.getElementById('commentsWrapper').innerHTML = `<div class="text-center text-red-500 font-bold py-10">Klaida kraunant komentarus.</div>`;
      });
    }

    window.togglePicker = (id) => {
      const picker = document.getElementById(`picker-${id}`);
      if(picker.classList.contains('hidden')) {
        document.querySelectorAll('.reaction-picker').forEach(p => p.classList.add('hidden'));
        picker.classList.remove('hidden');
      } else {
        picker.classList.add('hidden');
      }
    };

    function renderCommentsUI() {
      const wrapper = document.getElementById('commentsWrapper');
      wrapper.innerHTML = '';
      const t = TRANSLATIONS[currentLang] || TRANSLATIONS['EN'];
      
      if(commentsData.length === 0) {
        wrapper.innerHTML = `<div class="text-center py-12 text-[#8e7a68] font-medium border border-dashed border-[#ebdcd0] rounded-2xl">${t.noComments}</div>`;
        return;
      }

      commentsData.forEach(c => {
        const div = document.createElement('div');
        div.className = "bg-white border border-[#ebdcd0] rounded-2xl p-6 space-y-4 shadow-sm hover:shadow-md transition-shadow fade-in";
        
        const textToShow = (c.translations && c.translations[currentLang]) ? c.translations[currentLang] : c.originalText;
        const isTranslated = c.originalLang !== currentLang && c.translations && c.translations[currentLang];
        
        const reactions = c.reactions || {};
        let reactionsHTML = '';
        const userReactions = [];
        
        Object.entries(reactions).forEach(([emoji, users]) => {
          if (users.length > 0) {
            const hasReacted = users.includes(userId);
            if (hasReacted) userReactions.push(emoji);
            reactionsHTML += `<button onclick="toggleReaction('${c.id}', '${emoji}', ${hasReacted})" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold transition-colors ${hasReacted ? 'bg-[#b2533e]/10 text-[#b2533e] border border-[#b2533e]/30' : 'bg-stone-100 text-stone-600 hover:bg-stone-200 border border-transparent'}">${emoji} ${users.length}</button>`;
          }
        });

        let pickerHTML = `<div id="picker-${c.id}" class="reaction-picker hidden absolute bottom-full left-0 mb-2 bg-white border border-[#ebdcd0] shadow-xl rounded-2xl p-3 flex flex-wrap gap-2 w-72 z-10">`;
        ALLOWED_REACTIONS.forEach(emoji => {
          const hasReacted = userReactions.includes(emoji);
          pickerHTML += `<button onclick="toggleReaction('${c.id}', '${emoji}', ${hasReacted}); togglePicker('${c.id}')" class="w-10 h-10 flex items-center justify-center hover:bg-stone-100 rounded-xl text-xl transition-transform hover:scale-110 ${hasReacted ? 'bg-stone-100 border border-[#b2533e]/30' : ''}">${emoji}</button>`;
        });
        pickerHTML += `</div>`;

        div.innerHTML = `
          <div class="flex justify-between items-start gap-2">
            <div>
              <h4 class="font-bold text-base text-[#2c2520]">${c.name}</h4>
              <p class="text-xs text-[#8e7a68] uppercase tracking-wider font-bold mt-1">📍 ${c.country}</p>
            </div>
          </div>
          <p class="text-base text-[#5c524a] font-medium leading-relaxed whitespace-pre-wrap">${textToShow}</p>
          ${isTranslated ? `
            <div class="pt-3 border-t border-[#f1ede6] flex items-center justify-between text-xs text-[#8e7a68]">
              <span class="font-bold">✨ ${t.translatedFrom} ${c.originalLang}</span>
              <span class="opacity-60 font-bold">AI Translation</span>
            </div>
          ` : ''}
          <div class="pt-3 flex items-center gap-2 flex-wrap relative">
            ${reactionsHTML}
            <button onclick="togglePicker('${c.id}')" class="flex items-center justify-center w-8 h-8 rounded-full bg-stone-100 text-stone-500 hover:bg-stone-200 hover:text-[#b2533e] transition-colors font-bold text-lg leading-none pb-1">+</button>
            ${pickerHTML}
          </div>
        `;
        wrapper.appendChild(div);
      });
    }

    window.toggleReaction = async (commentId, emoji, hasReacted) => {
      const commentRef = doc(db, "comments", commentId);
      try {
        if(hasReacted) {
          await updateDoc(commentRef, { [`reactions.${emoji}`]: arrayRemove(userId) });
        } else {
          await updateDoc(commentRef, { [`reactions.${emoji}`]: arrayUnion(userId) });
        }
      } catch(e) {}
    };

    function generateMockTranslations(originalText, sourceLang) {
      const langs = ["LT", "EN", "RU", "LV", "KUR", "AM", "PT", "ES", "HE", "JA", "FR", "SV"];
      let trans = {};
      langs.forEach(l => {
        if(l === sourceLang) {
          trans[l] = originalText;
        } else {
          trans[l] = `[AI: ${l}] ${originalText}`;
        }
      });
      return trans;
    }

    document.getElementById('commentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnSubmitComment');
      const loader = document.getElementById('loader');
      const name = document.getElementById('formName').value;
      const text = document.getElementById('formText').value;
      
      btn.disabled = true;
      loader.classList.remove('hide');

      const translations = generateMockTranslations(text, currentLang);

      try {
        await addDoc(collection(db, "comments"), {
          name: name,
          country: currentCountry,
          originalLang: currentLang,
          originalText: text,
          translations: translations,
          timestamp: serverTimestamp(),
          reactions: {}
        });
        document.getElementById('formText').value = '';
      } catch (error) {
      } finally {
        btn.disabled = false;
        loader.classList.add('hide');
      }
    });

    init();
  </script>
</body>
</html>
