<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --bg-main: #F4F1EB;
        --bg-surface: #FFFFFF;
        --text-dark: #2A2826;
        --text-muted: #6B655E;
        --accent-clay: #9A6A53;
        --border-color: #E3DCD2;
        --radius-sm: 4px;
        --radius-lg: 12px;
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-serif: "Georgia", "Times New Roman", serif;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
        font-family: var(--font-sans);
        background-color: var(--bg-main);
        color: var(--text-dark);
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
    }

    h1, h2, h3 { font-family: var(--font-serif); font-weight: 400; color: var(--text-dark); }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

    .splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(244, 241, 235, 0.95); backdrop-filter: blur(10px);
        z-index: 9999; display: flex; justify-content: center; align-items: center;
        transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    .splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-content {
        background: var(--bg-surface); padding: 3rem; border-radius: var(--radius-lg);
        box-shadow: 0 20px 50px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 90%;
    }
    .splash-content h2 { margin-bottom: 1.5rem; font-size: 2rem; }
    .splash-content select { width: 100%; margin-bottom: 1.5rem; padding: 0.8rem 1.2rem; }
    .splash-btn {
        width: 100%; background: var(--accent-clay); color: white; border: none;
        padding: 1rem; border-radius: 30px; font-size: 1rem; cursor: pointer; transition: var(--transition);
    }
    .splash-btn:hover { background: #7A5240; }

    .lightbox {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(20, 18, 17, 0.98); z-index: 10000;
        display: flex; justify-content: center; align-items: center;
        opacity: 0; visibility: hidden; transition: opacity 0.3s ease;
        user-select: none;
    }
    .lightbox.active { opacity: 1; visibility: visible; }
    .lightbox img { max-width: 90%; max-height: 90vh; border-radius: var(--radius-sm); box-shadow: 0 10px 40px rgba(0,0,0,0.3); transition: transform 0.3s ease; }
    .lightbox-close {
        position: absolute; top: 30px; right: 40px; color: white; font-size: 40px;
        cursor: pointer; font-family: var(--font-sans); line-height: 1; transition: var(--transition); z-index: 10001;
    }
    .lightbox-close:hover { color: var(--accent-clay); transform: scale(1.1); }
    
    .lightbox-nav {
        position: absolute; top: 50%; transform: translateY(-50%);
        color: white; font-size: 3rem; cursor: pointer; padding: 2rem;
        transition: var(--transition); z-index: 10001; opacity: 0.7;
    }
    .lightbox-nav:hover { opacity: 1; color: var(--accent-clay); }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    header {
        position: fixed; top: 0; width: 100%; background: rgba(244, 241, 235, 0.9);
        backdrop-filter: blur(10px); border-bottom: 1px solid rgba(227, 220, 210, 0.5); z-index: 1000;
    }
    .nav-wrapper { display: flex; justify-content: space-between; align-items: center; height: 90px; }
    .logo img { height: 65px; mix-blend-mode: multiply; transition: var(--transition); }
    .logo img:hover { opacity: 0.8; }
    .controls { display: flex; gap: 1rem; }
    
    select {
        appearance: none; background: transparent; border: 1px solid var(--border-color);
        padding: 0.5rem 2.5rem 0.5rem 1.2rem; border-radius: 30px; font-family: var(--font-sans);
        font-size: 0.85rem; color: var(--text-dark); cursor: pointer; transition: var(--transition);
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%236B655E'/%3E%3C/svg%3E");
        background-repeat: no-repeat; background-position: right 1rem center;
    }
    select:hover, select:focus { outline: none; border-color: var(--accent-clay); background-color: var(--bg-surface); }

    .hero {
        min-height: 85vh; display: flex; flex-direction: column; justify-content: center;
        align-items: center; text-align: center; padding: 160px 2rem 4rem; position: relative;
    }
    .hero::after { content: ''; position: absolute; bottom: 0; width: 1px; height: 80px; background: var(--accent-clay); opacity: 0.4; }
    .hero h1 { font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.1; margin-bottom: 2rem; letter-spacing: 2px; }
    .hero p { font-size: clamp(1.05rem, 1.8vw, 1.15rem); color: var(--text-muted); max-width: 850px; margin: 0 auto 2.5rem; line-height: 1.8; }
    
    .btn-outline {
        display: inline-block; text-decoration: none; color: var(--accent-clay);
        border: 1px solid var(--accent-clay); padding: 0.8rem 2.5rem; border-radius: 30px;
        font-size: 1rem; transition: var(--transition);
    }
    .btn-outline:hover { background: var(--accent-clay); color: var(--bg-surface); }

    .section { padding: 6rem 0; }
    .section-header { text-align: center; margin-bottom: 4rem; }
    .section-header h2 { font-size: 2.5rem; position: relative; display: inline-block; padding-bottom: 1rem; }
    .section-header h2::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 1px; background: var(--accent-clay); }

    .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: var(--radius-sm); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    .gallery-filters { display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap; }
    .filter-btn { background: transparent; border: 1px solid transparent; padding: 0.6rem 1.8rem; border-radius: 30px; cursor: pointer; font-size: 0.9rem; color: var(--text-muted); transition: var(--transition); }
    .filter-btn:hover { color: var(--accent-clay); }
    .filter-btn.active { background: var(--bg-surface); color: var(--accent-clay); border-color: var(--border-color); }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
    .gallery-item { border-radius: var(--radius-sm); overflow: hidden; background: var(--bg-surface); transition: var(--transition); cursor: zoom-in; }
    .gallery-item img { width: 100%; height: 400px; object-fit: cover; display: block; filter: sepia(30%) contrast(90%); transition: var(--transition); }
    .gallery-item:hover img { filter: sepia(0%) contrast(100%); transform: scale(1.02); }

    .process-images { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
    .process-images img { width: 100%; height: 300px; object-fit: cover; border-radius: var(--radius-sm); filter: sepia(20%); cursor: zoom-in; transition: var(--transition); }
    .process-images img:hover { filter: sepia(0%); }

    .comments-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 4rem; }
    .comment-form { background: var(--bg-surface); padding: 3rem; border-radius: var(--radius-sm); box-shadow: 0 10px 30px rgba(0,0,0,0.03); height: fit-content; }
    .form-group { margin-bottom: 2rem; position: relative; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.5rem 0; border: none; border-bottom: 1px solid var(--border-color); background: transparent; font-family: var(--font-sans); font-size: 1rem; color: var(--text-dark); transition: var(--transition); }
    .form-group textarea { resize: none; min-height: 100px; line-height: 1.8; background-image: linear-gradient(transparent, transparent calc(1.8em - 1px), var(--border-color) 0px); background-size: 100% 1.8em; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-bottom-color: var(--accent-clay); }
    .form-group input::placeholder, .form-group textarea::placeholder { color: #A8A39D; font-style: italic; }
    .btn-submit { width: 100%; background: transparent; color: var(--accent-clay); border: 1px solid var(--accent-clay); padding: 1rem; border-radius: 30px; font-size: 1rem; cursor: pointer; transition: var(--transition); margin-top: 1rem; }
    .btn-submit:hover { background: var(--accent-clay); color: var(--bg-surface); }

    .comments-list { display: flex; flex-direction: column; gap: 2rem; }
    .comment-card { padding: 0 0 2rem 0; border-bottom: 1px solid var(--border-color); }
    .comment-header { display: flex; justify-content: space-between; margin-bottom: 1rem; align-items: baseline; }
    .comment-author { font-family: var(--font-serif); font-size: 1.2rem; color: var(--text-dark); }
    .comment-country { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .comment-body { color: var(--text-muted); font-size: 1.05rem; margin-bottom: 1rem; font-style: italic; }

    .fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
        .comments-layout { grid-template-columns: 1fr; gap: 3rem; }
        .hero { padding: 140px 1rem 3rem; }
        .comment-form { padding: 2rem; }
        .logo img { height: 50px; }
        .lightbox-nav { font-size: 2rem; padding: 1rem; }
    }
</style>
</head>

<header>

    <section class="section container fade-in" id="letter-section">

        </div>
    </section>
</main>

function init() {
    populateDropdowns();
    setupScrollAnimations();
    setupLightbox();
    
    const savedSetup = localStorage.getItem('v2026_setup');
    if (!savedSetup) {
        document.getElementById('splashScreen').classList.remove('hidden');
    } else {
        const setup = JSON.parse(savedSetup);
        applySetup(setup.lang, setup.country);
    }

    document.getElementById('splashEnter').addEventListener('click', () => {
        const lang = document.getElementById('splashLang').value;
        const country = document.getElementById('splashCountry').value;
        localStorage.setItem('v2026_setup', JSON.stringify({ lang, country }));
        document.getElementById('splashScreen').classList.add('hidden');
        applySetup(lang, country);
    });

    document.getElementById('langSelect').addEventListener('change', (e) => setLanguage(e.target.value));
    document.getElementById('countrySelect').addEventListener('change', (e) => {
        const c = countries.find(x => x.id === e.target.value);
        if (c) {
            document.getElementById('langSelect').value = c.lang;
            setLanguage(c.lang);
        }
    });

    document.getElementById('galleryFilters').addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON') {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            renderGallery(e.target.dataset.filter);
        }
    });

    document.getElementById('guestbookForm').addEventListener('submit', handleCommentSubmit);
    
    renderGallery('all');
    setupProcessImages();
    loadComments();
}

function populateDropdowns() {
    const langSelects = [document.getElementById('langSelect'), document.getElementById('splashLang')];
    languages.forEach(l => {
        langSelects.forEach(select => {
            const opt = document.createElement('option');
            opt.value = l.code; opt.textContent = l.name;
            select.appendChild(opt);
        });
    });

    const countrySelects = [document.getElementById('countrySelect'), document.getElementById('splashCountry')];
    const formCountrySelect = document.getElementById('cCountry');
    
    countries.sort((a, b) => a.name.localeCompare(b.name)).forEach(c => {
        countrySelects.forEach(select => {
            const opt = document.createElement('option');
            opt.value = c.id; opt.textContent = c.name;
            select.appendChild(opt);
        });
        const formOpt = document.createElement('option');
        formOpt.value = c.name; formOpt.textContent = c.name;
        formCountrySelect.appendChild(formOpt);
    });
}

function applySetup(lang, countryId) {
    document.getElementById('langSelect').value = lang;
    document.getElementById('countrySelect').value = countryId;
    const c = countries.find(x => x.id === countryId);
    if(c) document.getElementById('cCountry').value = c.name;
    setLanguage(lang);
}

function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[lang] && dict[lang][key]) {
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                el.placeholder = dict[lang][key];
            } else {
                el.textContent = dict[lang][key];
            }
        }
    });
    renderComments();
}

function setupLightbox() {
    const lightbox = document.getElementById('lightbox');
    document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('active'));
    document.getElementById('lightboxNext').addEventListener('click', nextImage);
    document.getElementById('lightboxPrev').addEventListener('click', prevImage);
    
    lightbox.addEventListener('click', (e) => {
        if(e.target === lightbox) lightbox.classList.remove('active');
    });

    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'ArrowRight') nextImage();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'Escape') lightbox.classList.remove('active');
    });

    let touchstartX = 0;
    let touchendX = 0;
    lightbox.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
    lightbox.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        if (touchendX < touchstartX - 50) nextImage();
        if (touchendX > touchstartX + 50) prevImage();
    });
}

function openLightbox(index, images) {
    currentLightboxImages = images;
    currentLightboxIndex = index;
    updateLightboxImage();
    document.getElementById('lightbox').classList.add('active');
}

function updateLightboxImage() {
    document.getElementById('lightboxImg').src = currentLightboxImages[currentLightboxIndex];
}

function nextImage() {
    currentLightboxIndex = (currentLightboxIndex + 1) % currentLightboxImages.length;
    updateLightboxImage();
}

function prevImage() {
    currentLightboxIndex = (currentLightboxIndex - 1 + currentLightboxImages.length) % currentLightboxImages.length;
    updateLightboxImage();
}

function renderGallery(filter) {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    const filteredData = galleryData.filter(item => filter === 'all' || item.type === filter);
    const urls = filteredData.map(item => item.url);
    
    filteredData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        const img = document.createElement('img');
        img.src = item.url; img.loading = "lazy";
        img.addEventListener('click', () => openLightbox(index, urls));
        div.appendChild(img);
        grid.appendChild(div);
    });
}

function setupProcessImages() {
    const processImgs = Array.from(document.querySelectorAll('#processGrid img'));
    const urls = processImgs.map(img => img.src);
    processImgs.forEach((img, index) => {
        img.addEventListener('click', () => openLightbox(index, urls));
    });
}

async function handleCommentSubmit(e) {
    e.preventDefault();
    const name = document.getElementById('cName').value;
    const country = document.getElementById('cCountry').value;
    const message = document.getElementById('cMessage').value;

    const newComment = {
        name, country, original: message,
        timestamp: new Date().toLocaleDateString()
    };

    const btn = e.target.querySelector('.btn-submit');
    const originalText = btn.textContent;
    btn.textContent = "...";
    btn.disabled = true;

    if (API_URL && API_URL.trim() !== "") {
        try {
            await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(newComment) });
            await new Promise(r => setTimeout(r, 1000));
        } catch (error) {}
    } else {
        let localComments = JSON.parse(localStorage.getItem('v2026_comments')) || [];
        localComments.unshift(newComment);
        localStorage.setItem('v2026_comments', JSON.stringify(localComments));
    }

    btn.textContent = originalText;
    btn.disabled = false;
    e.target.reset();
    
    const savedSetup = JSON.parse(localStorage.getItem('v2026_setup'));
    if(savedSetup) applySetup(savedSetup.lang, savedSetup.country);
    
    loadComments();
}

async function loadComments() {
    if (API_URL && API_URL.trim() !== "") {
        try {
            const response = await fetch(API_URL);
            comments = await response.json();
        } catch (error) {
            comments = JSON.parse(localStorage.getItem('v2026_comments')) || [];
        }
    } else {
        comments = JSON.parse(localStorage.getItem('v2026_comments')) || [];
    }
    renderComments();
}

function renderComments() {
    const list = document.getElementById('commentsList');
    list.innerHTML = '';
    comments.forEach(c => {
        const card = document.createElement('div');
        card.className = 'comment-card';
        card.innerHTML = `
            <div class="comment-header">
                <span class="comment-author">${c.name}</span>
                <span class="comment-country">${c.country} • ${c.timestamp}</span>
            </div>
            <div class="comment-body">"${c.original}"</div>
        `;
        list.appendChild(card);
    });
}

function setupScrollAnimations() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

document.addEventListener('DOMContentLoaded', init);
