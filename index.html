<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vilnius 2026</title>
<style>
    :root {
        --bg-main: #F4F1EB;
        --bg-surface: #FFFFFF;
        --text-dark: #2A2826;
        --text-muted: #6B655E;
        --accent-clay: #9A6A53;
        --border-color: #E3DCD2;
        --radius-sm: 4px;
        --radius-lg: 12px;
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-serif: "Georgia", "Times New Roman", serif;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
        font-family: var(--font-sans);
        background-color: var(--bg-main);
        color: var(--text-dark);
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
    }

    h1, h2, h3 { font-family: var(--font-serif); font-weight: 400; color: var(--text-dark); }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

    /* --- SPLASH SCREEN --- */
    .splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(244, 241, 235, 0.95); backdrop-filter: blur(10px);
        z-index: 9999; display: flex; justify-content: center; align-items: center;
        transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    .splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-content {
        background: var(--bg-surface); padding: 3rem; border-radius: var(--radius-lg);
        box-shadow: 0 20px 50px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 90%;
    }
    .splash-content h2 { margin-bottom: 1.5rem; font-size: 2rem; }
    .splash-content select { width: 100%; margin-bottom: 1.5rem; padding: 0.8rem 1.2rem; }
    .splash-btn {
        width: 100%; background: var(--accent-clay); color: white; border: none;
        padding: 1rem; border-radius: 30px; font-size: 1rem; cursor: pointer; transition: var(--transition);
    }
    .splash-btn:hover { background: #7A5240; }

    /* --- LIGHTBOX --- */
    .lightbox {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(20, 18, 17, 0.95); z-index: 10000;
        display: flex; justify-content: center; align-items: center;
        opacity: 0; visibility: hidden; transition: opacity 0.3s ease;
    }
    .lightbox.active { opacity: 1; visibility: visible; }
    .lightbox img { max-width: 90%; max-height: 90vh; border-radius: var(--radius-sm); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .lightbox-close {
        position: absolute; top: 30px; right: 40px; color: white; font-size: 40px;
        cursor: pointer; font-family: var(--font-sans); line-height: 1; transition: var(--transition);
    }
    .lightbox-close:hover { color: var(--accent-clay); transform: scale(1.1); }

    /* --- HEADER & LAYOUT --- */
    header {
        position: fixed; top: 0; width: 100%; background: rgba(244, 241, 235, 0.9);
        backdrop-filter: blur(10px); border-bottom: 1px solid rgba(227, 220, 210, 0.5); z-index: 1000;
    }
    .nav-wrapper { display: flex; justify-content: space-between; align-items: center; height: 90px; }
    .logo img { height: 65px; mix-blend-mode: multiply; transition: var(--transition); }
    .logo img:hover { opacity: 0.8; }
    .controls { display: flex; gap: 1rem; }
    
    select {
        appearance: none; background: transparent; border: 1px solid var(--border-color);
        padding: 0.5rem 2.5rem 0.5rem 1.2rem; border-radius: 30px; font-family: var(--font-sans);
        font-size: 0.85rem; color: var(--text-dark); cursor: pointer; transition: var(--transition);
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%236B655E'/%3E%3C/svg%3E");
        background-repeat: no-repeat; background-position: right 1rem center;
    }
    select:hover, select:focus { outline: none; border-color: var(--accent-clay); background-color: var(--bg-surface); }

    .hero {
        min-height: 85vh; display: flex; flex-direction: column; justify-content: center;
        align-items: center; text-align: center; padding: 160px 2rem 4rem; position: relative;
    }
    .hero::after { content: ''; position: absolute; bottom: 0; width: 1px; height: 80px; background: var(--accent-clay); opacity: 0.4; }
    .hero h1 { font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.1; margin-bottom: 2rem; letter-spacing: 2px; }
    .hero p { font-size: clamp(1.05rem, 1.8vw, 1.15rem); color: var(--text-muted); max-width: 850px; margin: 0 auto 2.5rem; line-height: 1.8; }
    
    .btn-outline {
        display: inline-block; text-decoration: none; color: var(--accent-clay);
        border: 1px solid var(--accent-clay); padding: 0.8rem 2.5rem; border-radius: 30px;
        font-size: 1rem; transition: var(--transition);
    }
    .btn-outline:hover { background: var(--accent-clay); color: var(--bg-surface); }

    .section { padding: 6rem 0; }
    .section-header { text-align: center; margin-bottom: 4rem; }
    .section-header h2 { font-size: 2.5rem; position: relative; display: inline-block; padding-bottom: 1rem; }
    .section-header h2::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 1px; background: var(--accent-clay); }

    .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: var(--radius-sm); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    .gallery-filters { display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap; }
    .filter-btn { background: transparent; border: 1px solid transparent; padding: 0.6rem 1.8rem; border-radius: 30px; cursor: pointer; font-size: 0.9rem; color: var(--text-muted); transition: var(--transition); }
    .filter-btn:hover { color: var(--accent-clay); }
    .filter-btn.active { background: var(--bg-surface); color: var(--accent-clay); border-color: var(--border-color); }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
    .gallery-item { border-radius: var(--radius-sm); overflow: hidden; background: var(--bg-surface); transition: var(--transition); cursor: zoom-in; }
    .gallery-item img { width: 100%; height: 400px; object-fit: cover; display: block; filter: sepia(30%) contrast(90%); transition: var(--transition); }
    .gallery-item:hover img { filter: sepia(0%) contrast(100%); transform: scale(1.02); }

    .process-images { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
    .process-images img { width: 100%; height: 300px; object-fit: cover; border-radius: var(--radius-sm); filter: sepia(20%); cursor: zoom-in; transition: var(--transition); }
    .process-images img:hover { filter: sepia(0%); }

    .comments-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 4rem; }
    .comment-form { background: var(--bg-surface); padding: 3rem; border-radius: var(--radius-sm); box-shadow: 0 10px 30px rgba(0,0,0,0.03); height: fit-content; }
    .form-group { margin-bottom: 2rem; position: relative; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.5rem 0; border: none; border-bottom: 1px solid var(--border-color); background: transparent; font-family: var(--font-sans); font-size: 1rem; color: var(--text-dark); transition: var(--transition); }
    .form-group textarea { resize: none; min-height: 100px; line-height: 1.8; background-image: linear-gradient(transparent, transparent calc(1.8em - 1px), var(--border-color) 0px); background-size: 100% 1.8em; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-bottom-color: var(--accent-clay); }
    .form-group input::placeholder, .form-group textarea::placeholder { color: #A8A39D; font-style: italic; }
    .btn-submit { width: 100%; background: transparent; color: var(--accent-clay); border: 1px solid var(--accent-clay); padding: 1rem; border-radius: 30px; font-size: 1rem; cursor: pointer; transition: var(--transition); margin-top: 1rem; }
    .btn-submit:hover { background: var(--accent-clay); color: var(--bg-surface); }

    .comments-list { display: flex; flex-direction: column; gap: 2rem; }
    .comment-card { padding: 0 0 2rem 0; border-bottom: 1px solid var(--border-color); }
    .comment-header { display: flex; justify-content: space-between; margin-bottom: 1rem; align-items: baseline; }
    .comment-author { font-family: var(--font-serif); font-size: 1.2rem; color: var(--text-dark); }
    .comment-country { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .comment-body { color: var(--text-muted); font-size: 1.05rem; margin-bottom: 1rem; font-style: italic; }
    .ai-badge { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--accent-clay); text-transform: uppercase; letter-spacing: 0.5px; }

    .fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
        .comments-layout { grid-template-columns: 1fr; gap: 3rem; }
        .hero { padding: 140px 1rem 3rem; }
        .comment-form { padding: 2rem; }
        .logo img { height: 50px; }
    }
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splashScreen" class="splash-screen">
    <div class="splash-content">
        <h2>Welcome / Sveiki</h2>
        <select id="splashLang"></select>
        <select id="splashCountry"></select>
        <button id="splashEnter" class="splash-btn">Enter Gallery</button>
    </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <img id="lightboxImg" src="" alt="Enlarged view">
</div>

<header>
    <div class="container nav-wrapper">
        <a href="#" class="logo">
            <img src="https://i.postimg.cc/sXsbchSq/vilnius-family-2026.jpg" alt="Vilnius 2026 Logo">
        </a>
        <div class="controls">
            <select id="countrySelect"></select>
            <select id="langSelect"></select>
        </div>
    </div>
</header>

<main>
    <section class="hero container fade-in">
        <h1 data-i18n="heroTitle"></h1>
        <p data-i18n="heroDesc"></p>
        <!-- JUMP TO REVIEW BUTTON -->
        <a href="#letter-section" class="btn-outline" data-i18n="btnReview"></a>
    </section>

    <section class="section container fade-in">
        <div class="section-header">
            <h2 data-i18n="videoTitle"></h2>
        </div>
        <div class="video-container">
            <iframe src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?controls=0" title="Process Video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </section>

    <section class="section container fade-in">
        <div class="section-header">
            <h2 data-i18n="galleryTitle"></h2>
        </div>
        <div class="gallery-filters" id="galleryFilters">
            <button class="filter-btn active" data-filter="all" data-i18n="filterAll"></button>
            <button class="filter-btn" data-filter="posters" data-i18n="filterPosters"></button>
            <button class="filter-btn" data-filter="clay" data-i18n="filterClay"></button>
            <button class="filter-btn" data-filter="postcards" data-i18n="filterPostcards"></button>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </section>

    <section class="section container fade-in">
        <div class="section-header">
            <h2 data-i18n="processTitle"></h2>
        </div>
        <div class="process-images">
            <img src="https://i.postimg.cc/1tDg7Rvz/IMG-0043-160-Edited.jpg" alt="Process 1" loading="lazy" class="lightbox-trigger">
            <img src="https://i.postimg.cc/3rb0xqzm/IMG-7166-2.jpg" alt="Process 2" loading="lazy" class="lightbox-trigger">
            <img src="https://i.postimg.cc/B6287Zm0/IMG-0050-164-Edited.jpg" alt="Process 3" loading="lazy" class="lightbox-trigger">
            <img src="https://i.postimg.cc/XqXZgKBk/IMG-7169-2.jpg" alt="Process 4" loading="lazy" class="lightbox-trigger">
        </div>
    </section>

    <section class="section container fade-in" id="letter-section">
        <div class="section-header">
            <h2 data-i18n="commentsTitle"></h2>
        </div>
        <div class="comments-layout">
            <div class="comment-form">
                <form id="guestbookForm">
                    <div class="form-group">
                        <input type="text" id="cName" required data-i18n="formName">
                    </div>
                    <div class="form-group">
                        <!-- Country is auto-filled from Splash Screen -->
                        <select id="cCountry" required></select>
                    </div>
                    <div class="form-group">
                        <textarea id="cMessage" required data-i18n="formMessage"></textarea>
                    </div>
                    <button type="submit" class="btn-submit" data-i18n="formSubmit"></button>
                </form>
            </div>
            <div class="comments-list" id="commentsList"></div>
        </div>
    </section>
</main>

<!-- ИСПОЛЬЗУЕМ TYPE="MODULE" ДЛЯ ПОДКЛЮЧЕНИЯ FIREBASE -->
<script type="module">
// ==========================================
// 1. НАСТРОЙКА FIREBASE (БАЗА ДАННЫХ)
// ==========================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// ВСТАВЬТЕ СЮДА ВАШИ ДАННЫЕ ИЗ FIREBASE CONSOLE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let db = null;
try {
    // Если ключи не заменены, Firebase выдаст ошибку, и мы перейдем на localStorage
    if(firebaseConfig.apiKey !== "YOUR_API_KEY") {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
    }
} catch (e) {
    console.warn("Firebase is not configured yet. Using localStorage as fallback.");
}

// ==========================================
// 2. ДАННЫЕ И СЛОВАРИ
// ==========================================
const dict = {
    lt: {
        heroTitle: "Vilnius 2026",
        heroDesc: "Sveiki atvykę, mieli mūsų tarptautinės dvasinės šeimos broliai ir sesės! Mes be galo džiaugiamės, kad atvykote į kongresą Lietuvoje. Tai bus nepamirštamas kongresas. Mums be galo džiugu, kad galime jums parodyti Lietuvą. Šiuos plakatus su pasveikinimais įvairiomis kalbomis ir mūsų mažas molines dovanėles ruošėme specialiai jums su didele meile, norėdami supažindinti su mūsų kultūra ir tradicijomis. Šiame puslapyje norime parodyti, kaip viską kūrėme – čia rasite vaizdo įrašus iš mūsų darbo užkulisių. Mums būtų labai įdomu sužinoti jūsų įspūdžius. Prašome užeiti į skiltį „Laiškas“, pasirinkti savo šalį ir palikti mums keletą šiltų žodžių. Mes labai vertiname, kad esate kartu su mumis!",
        btnReview: "Palikti atsiliepimą",
        videoTitle: "Kūrimo Procesas", galleryTitle: "Paroda", filterAll: "Visi Darbai", filterPosters: "Plakatai", filterClay: "Molis", filterPostcards: "Atvirukai", processTitle: "Darbo Užkulisiai", commentsTitle: "Laiškas", formName: "Jūsų Vardas", formMessage: "Palikite savo mintis čia...", formSubmit: "Palikti Įrašą", aiTranslated: "AI Išversta"
    },
    en: {
        heroTitle: "Vilnius 2026",
        heroDesc: "Welcome, dear brothers and sisters of our international spiritual family! We are incredibly happy that you have come to the convention in Lithuania. This will be an unforgettable convention. We are so glad to be able to show you Lithuania. We prepared these posters with greetings in various languages and our small clay gifts especially for you with great love, wanting to introduce you to our culture and traditions. On this page, we want to show you how we created everything – here you will find videos from behind the scenes of our work. We would be very interested to hear your impressions. Please go to the \"Letter\" section, select your country, and leave us a few warm words. We deeply appreciate that you are here with us!",
        btnReview: "Leave a Review",
        videoTitle: "Creation Process", galleryTitle: "Exhibition", filterAll: "All Works", filterPosters: "Posters", filterClay: "Clay", filterPostcards: "Postcards", processTitle: "Behind the Scenes", commentsTitle: "Letter", formName: "Your Name", formMessage: "Write your thoughts here...", formSubmit: "Leave a Trace", aiTranslated: "AI Translated"
    },
    ru: {
        heroTitle: "Вильнюс 2026",
        heroDesc: "Добро пожаловать, дорогие братья и сестры нашей международной духовной семьи! Мы бесконечно рады, что вы приехали на конгресс в Литву. Это будет незабываемый конгресс. Мы очень рады возможности показать вам Литву. Эти плакаты с приветствиями на разных языках и наши маленькие глиняные подарки мы готовили специально для вас с большой любовью, желая познакомить с нашей культурой и традициями. На этой странице мы хотим показать, как всё создавалось — здесь вы найдете видео нашего рабочего процесса. Нам было бы очень интересно узнать ваши впечатления. Пожалуйста, зайдите в раздел «Письмо», выберите свою страну и оставьте нам несколько теплых слов. Мы очень ценим, что вы вместе с нами!",
        btnReview: "Оставить отзыв",
        videoTitle: "Процесс Создания", galleryTitle: "Выставка", filterAll: "Все Работы", filterPosters: "Плакаты", filterClay: "Глина", filterPostcards: "Открытки", processTitle: "За Кулисами", commentsTitle: "Письмо", formName: "Ваше Имя", formMessage: "Напишите свои мысли здесь...", formSubmit: "Оставить Запись", aiTranslated: "AI Перевод"
    }
    // (Остальные языки можно добавить по аналогии, чтобы не перегружать код)
};

const countries = [
    { id: 'lt', name: 'Lithuania', lang: 'lt' }, { id: 'lv', name: 'Latvia', lang: 'lv' },
    { id: 'am', name: 'Armenia', lang: 'ru' }, { id: 'br', name: 'Brazil', lang: 'en' },
    { id: 'us', name: 'USA', lang: 'en' }, { id: 'sc', name: 'Scandinavia', lang: 'en' }
];

const languages = [
    { code: 'lt', name: 'Lietuvių' }, { code: 'en', name: 'English' }, { code: 'ru', name: 'Русский' }
];

const galleryData = [
    { type: 'posters', url: 'https://i.postimg.cc/tgKZznNy/IMG-0018-143-Edited.jpg' },
    { type: 'posters', url: 'https://i.postimg.cc/mD7cpZmC/IMG-0024-1-Edited.jpg' },
    { type: 'clay', url: 'https://i.postimg.cc/L6YYYTpM/IMG-7135-2.jpg' },
    { type: 'clay', url: 'https://i.postimg.cc/fTtttKhP/IMG-7139-2.jpg' },
    { type: 'postcards', url: 'https://i.postimg.cc/yNMgT3yz/IMG-0071-174-Edited.jpg' }
];

let currentLang = 'en';
let comments = JSON.parse(localStorage.getItem('v2026_comments')) || [];

// ==========================================
// 3. ИНИЦИАЛИЗАЦИЯ И SPLASH SCREEN
// ==========================================
function init() {
    populateDropdowns();
    setupScrollAnimations();
    setupLightbox();
    
    // Проверка Splash Screen
    const savedSetup = localStorage.getItem('v2026_setup');
    if (!savedSetup) {
        document.getElementById('splashScreen').classList.remove('hidden');
    } else {
        const setup = JSON.parse(savedSetup);
        applySetup(setup.lang, setup.country);
    }

    document.getElementById('splashEnter').addEventListener('click', () => {
        const lang = document.getElementById('splashLang').value;
        const country = document.getElementById('splashCountry').value;
        localStorage.setItem('v2026_setup', JSON.stringify({ lang, country }));
        document.getElementById('splashScreen').classList.add('hidden');
        applySetup(lang, country);
    });

    document.getElementById('langSelect').addEventListener('change', (e) => setLanguage(e.target.value));
    document.getElementById('countrySelect').addEventListener('change', (e) => {
        const c = countries.find(x => x.id === e.target.value);
        if (c) {
            document.getElementById('langSelect').value = c.lang;
            setLanguage(c.lang);
        }
    });

    document.getElementById('galleryFilters').addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON') {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            renderGallery(e.target.dataset.filter);
        }
    });

    document.getElementById('guestbookForm').addEventListener('submit', handleCommentSubmit);
    
    renderGallery('all');
    loadComments();
}

function populateDropdowns() {
    const langSelects = [document.getElementById('langSelect'), document.getElementById('splashLang')];
    languages.forEach(l => {
        langSelects.forEach(select => {
            const opt = document.createElement('option');
            opt.value = l.code; opt.textContent = l.name;
            select.appendChild(opt);
        });
    });

    const countrySelects = [document.getElementById('countrySelect'), document.getElementById('splashCountry')];
    const formCountrySelect = document.getElementById('cCountry');
    
    countries.forEach(c => {
        countrySelects.forEach(select => {
            const opt = document.createElement('option');
            opt.value = c.id; opt.textContent = c.name;
            select.appendChild(opt);
        });
        const formOpt = document.createElement('option');
        formOpt.value = c.name; formOpt.textContent = c.name;
        formCountrySelect.appendChild(formOpt);
    });
}

function applySetup(lang, countryId) {
    document.getElementById('langSelect').value = lang;
    document.getElementById('countrySelect').value = countryId;
    
    // Автозаполнение страны в форме отзыва
    const c = countries.find(x => x.id === countryId);
    if(c) document.getElementById('cCountry').value = c.name;
    
    setLanguage(lang);
}

function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[lang] && dict[lang][key]) {
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                el.placeholder = dict[lang][key];
            } else {
                el.textContent = dict[lang][key];
            }
        }
    });
    renderComments();
}

// ==========================================
// 4. LIGHTBOX (УВЕЛИЧЕНИЕ ФОТО)
// ==========================================
function setupLightbox() {
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    
    // Для статических картинок процесса
    document.querySelectorAll('.lightbox-trigger').forEach(img => {
        img.addEventListener('click', () => openLightbox(img.src));
    });

    document.getElementById('lightboxClose').addEventListener('click', () => {
        lightbox.classList.remove('active');
    });
    lightbox.addEventListener('click', (e) => {
        if(e.target === lightbox) lightbox.classList.remove('active');
    });
}

function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('active');
}

function renderGallery(filter) {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    galleryData.forEach(item => {
        if (filter === 'all' || item.type === filter) {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            const img = document.createElement('img');
            img.src = item.url;
            img.loading = "lazy";
            // Добавляем клик для Lightbox на динамические картинки
            img.addEventListener('click', () => openLightbox(item.url));
            div.appendChild(img);
            grid.appendChild(div);
        }
    });
}

// ==========================================
// 5. ОТЗЫВЫ И БАЗА ДАННЫХ
// ==========================================
async function handleCommentSubmit(e) {
    e.preventDefault();
    const name = document.getElementById('cName').value;
    const country = document.getElementById('cCountry').value;
    const message = document.getElementById('cMessage').value;

    const newComment = {
        name, country, original: message,
        timestamp: new Date().toISOString()
    };

    // Если Firebase подключен, сохраняем туда
    if (db) {
        try {
            await addDoc(collection(db, "comments"), newComment);
        } catch (error) {
            console.error("Error adding to Firebase: ", error);
        }
    } else {
        // Иначе сохраняем локально
        comments.unshift(newComment);
        localStorage.setItem('v2026_comments', JSON.stringify(comments));
    }
    
    e.target.reset();
    // Восстанавливаем страну после сброса формы
    const savedSetup = JSON.parse(localStorage.getItem('v2026_setup'));
    if(savedSetup) applySetup(savedSetup.lang, savedSetup.country);
    
    loadComments();
}

async function loadComments() {
    if (db) {
        try {
            const q = query(collection(db, "comments"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            comments = [];
            querySnapshot.forEach((doc) => {
                comments.push(doc.data());
            });
        } catch (error) {
            console.error("Error loading from Firebase: ", error);
        }
    }
    renderComments();
}

function renderComments() {
    const list = document.getElementById('commentsList');
    list.innerHTML = '';
    comments.forEach(c => {
        const card = document.createElement('div');
        card.className = 'comment-card';
        card.innerHTML = `
            <div class="comment-header">
                <span class="comment-author">${c.name}</span>
                <span class="comment-country">${c.country}</span>
            </div>
            <div class="comment-body">"${c.original}"</div>
        `;
        list.appendChild(card);
    });
}

function setupScrollAnimations() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

document.addEventListener('DOMContentLoaded', init);
</script>
