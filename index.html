<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vilnius Family 2026</title>
<style>
    :root {
        --bg-main: #F4F1EB;
        --bg-surface: #FFFFFF;
        --text-dark: #2A2826;
        --text-muted: #6B655E;
        --accent-clay: #9A6A53;
        --border-color: #E3DCD2;
        --radius-sm: 4px;
        --radius-lg: 12px;
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-serif: "Georgia", "Times New Roman", serif;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
        font-family: var(--font-sans);
        background-color: var(--bg-main);
        color: var(--text-dark);
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
    }

    h1, h2, h3 {
        font-family: var(--font-serif);
        font-weight: 400;
        color: var(--text-dark);
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
    }

    header {
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(244, 241, 235, 0.9);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(227, 220, 210, 0.5);
        z-index: 1000;
    }

    .nav-wrapper {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 90px;
    }

    .logo {
        display: flex;
        align-items: center;
        text-decoration: none;
    }

    .logo img {
        height: 65px;
        width: auto;
        mix-blend-mode: multiply; /* Leidžia logotipui gražiai susilieti su fonu */
        transition: var(--transition);
    }

    .logo img:hover {
        opacity: 0.8;
    }

    .controls {
        display: flex;
        gap: 1rem;
    }

    select {
        appearance: none;
        background: transparent;
        border: 1px solid var(--border-color);
        padding: 0.5rem 2.5rem 0.5rem 1.2rem;
        border-radius: 30px;
        font-family: var(--font-sans);
        font-size: 0.85rem;
        color: var(--text-dark);
        cursor: pointer;
        transition: var(--transition);
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%236B655E'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 1rem center;
    }

    select:hover, select:focus {
        outline: none;
        border-color: var(--accent-clay);
        background-color: var(--bg-surface);
    }

    .hero {
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 140px 2rem 4rem;
        position: relative;
    }

    .hero::after {
        content: '';
        position: absolute;
        bottom: 0;
        width: 1px;
        height: 80px;
        background: var(--accent-clay);
        opacity: 0.4;
    }

    .hero h1 {
        font-size: clamp(3rem, 6vw, 5rem);
        line-height: 1.1;
        margin-bottom: 2rem;
        letter-spacing: 2px;
    }

    .hero p {
        font-size: clamp(1.1rem, 2vw, 1.25rem);
        color: var(--text-muted);
        max-width: 700px;
        margin: 0 auto;
        font-weight: 300;
        font-style: italic;
    }

    .section {
        padding: 6rem 0;
    }

    .section-header {
        text-align: center;
        margin-bottom: 4rem;
    }

    .section-header h2 {
        font-size: 2.5rem;
        position: relative;
        display: inline-block;
        padding-bottom: 1rem;
    }

    .section-header h2::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 1px;
        background: var(--accent-clay);
    }

    .video-container {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        border-radius: var(--radius-sm);
        box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }

    .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
    }

    .gallery-filters {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 3rem;
        flex-wrap: wrap;
    }

    .filter-btn {
        background: transparent;
        border: 1px solid transparent;
        padding: 0.6rem 1.8rem;
        border-radius: 30px;
        cursor: pointer;
        font-size: 0.9rem;
        color: var(--text-muted);
        transition: var(--transition);
    }

    .filter-btn:hover {
        color: var(--accent-clay);
    }

    .filter-btn.active {
        background: var(--bg-surface);
        color: var(--accent-clay);
        border-color: var(--border-color);
    }

    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 2rem;
    }

    .gallery-item {
        border-radius: var(--radius-sm);
        overflow: hidden;
        background: var(--bg-surface);
        transition: var(--transition);
        cursor: pointer;
    }

    .gallery-item img {
        width: 100%;
        height: 400px;
        object-fit: cover;
        display: block;
        filter: sepia(30%) contrast(90%);
        transition: var(--transition);
    }

    .gallery-item:hover img {
        filter: sepia(0%) contrast(100%);
        transform: scale(1.02);
    }

    .process-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 4rem;
        align-items: center;
    }

    .process-text p {
        margin-bottom: 1.5rem;
        font-size: 1.1rem;
        color: var(--text-muted);
    }

    .process-images {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }

    .process-images img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: var(--radius-sm);
        filter: sepia(20%);
    }

    .comments-layout {
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 4rem;
    }

    .comment-form {
        background: var(--bg-surface);
        padding: 3rem;
        border-radius: var(--radius-sm);
        box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        height: fit-content;
    }

    .form-group {
        margin-bottom: 2rem;
        position: relative;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 0.5rem 0;
        border: none;
        border-bottom: 1px solid var(--border-color);
        background: transparent;
        font-family: var(--font-sans);
        font-size: 1rem;
        color: var(--text-dark);
        transition: var(--transition);
    }

    .form-group textarea {
        resize: none;
        min-height: 100px;
        line-height: 1.8;
        background-image: linear-gradient(transparent, transparent calc(1.8em - 1px), var(--border-color) 0px);
        background-size: 100% 1.8em;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        border-bottom-color: var(--accent-clay);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
        color: #A8A39D;
        font-style: italic;
    }

    .btn-submit {
        width: 100%;
        background: transparent;
        color: var(--accent-clay);
        border: 1px solid var(--accent-clay);
        padding: 1rem;
        border-radius: 30px;
        font-size: 1rem;
        cursor: pointer;
        transition: var(--transition);
        margin-top: 1rem;
    }

    .btn-submit:hover {
        background: var(--accent-clay);
        color: var(--bg-surface);
    }

    .comments-list {
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    .comment-card {
        padding: 0 0 2rem 0;
        border-bottom: 1px solid var(--border-color);
    }

    .comment-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
        align-items: baseline;
    }

    .comment-author {
        font-family: var(--font-serif);
        font-size: 1.2rem;
        color: var(--text-dark);
    }

    .comment-country {
        font-size: 0.85rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .comment-body {
        color: var(--text-muted);
        font-size: 1.05rem;
        margin-bottom: 1rem;
        font-style: italic;
    }

    .ai-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.75rem;
        color: var(--accent-clay);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .fade-in {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }

    .fade-in.visible {
        opacity: 1;
        transform: translateY(0);
    }

    @media (max-width: 900px) {
        .process-grid, .comments-layout {
            grid-template-columns: 1fr;
            gap: 3rem;
        }
        .hero {
            padding: 120px 1rem 3rem;
        }
        .comment-form {
            padding: 2rem;
        }
        .logo img {
            height: 50px;
        }
    }
</style>
</head>

function init() {
    const langSelect = document.getElementById('langSelect');
    languages.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.code;
        opt.textContent = l.name;
        langSelect.appendChild(opt);
    });

    const countrySelect = document.getElementById('countrySelect');
    const defaultOpt = document.createElement('option');
    defaultOpt.value = "";
    defaultOpt.textContent = "Select Country";
    countrySelect.appendChild(defaultOpt);
    
    const formCountrySelect = document.getElementById('cCountry');
    const formDefaultOpt = document.createElement('option');
    formDefaultOpt.value = "";
    formDefaultOpt.textContent = "Representing Country...";
    formCountrySelect.appendChild(formDefaultOpt);

    countries.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        countrySelect.appendChild(opt);
        
        const formOpt = document.createElement('option');
        formOpt.value = c.name;
        formOpt.textContent = c.name;
        formCountrySelect.appendChild(formOpt);
    });

    langSelect.addEventListener('change', (e) => setLanguage(e.target.value));
    countrySelect.addEventListener('change', (e) => {
        const c = countries.find(x => x.id === e.target.value);
        if (c) {
            langSelect.value = c.lang;
            setLanguage(c.lang);
        }
    });

    document.getElementById('galleryFilters').addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON') {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            renderGallery(e.target.dataset.filter);
        }
    });

    document.getElementById('guestbookForm').addEventListener('submit', handleCommentSubmit);

    setupScrollAnimations();
    setLanguage('en');
    renderGallery('all');
    renderComments();
}

function setupScrollAnimations() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
    
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[lang] && dict[lang][key]) {
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                el.placeholder = dict[lang][key];
            } else {
                el.textContent = dict[lang][key];
            }
        }
    });
    renderComments();
}

function renderGallery(filter) {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    galleryData.forEach(item => {
        if (filter === 'all' || item.type === filter) {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `<img src="${item.url}" loading="lazy" alt="${item.type}">`;
            grid.appendChild(div);
        }
    });
}

function mockTranslate(text, targetLang) {
    if (targetLang === 'en') return text;
    let translated = text.toLowerCase();
    let changed = false;
    
    for (const [engWord, translations] of Object.entries(mockTranslationDict)) {
        if (translated.includes(engWord) && translations[targetLang]) {
            const regex = new RegExp(engWord, "gi");
            translated = translated.replace(regex, translations[targetLang]);
            changed = true;
        }
    }
    
    if (!changed) return text;
    return translated.charAt(0).toUpperCase() + translated.slice(1);
}

function handleCommentSubmit(e) {
    e.preventDefault();
    const name = document.getElementById('cName').value;
    const country = document.getElementById('cCountry').value;
    const message = document.getElementById('cMessage').value;

    const translations = {};
    languages.forEach(l => {
        translations[l.code] = mockTranslate(message, l.code);
    });

    const newComment = {
        id: Date.now(),
        name,
        country,
        original: message,
        translations,
        timestamp: new Date().toISOString()
    };

    comments.unshift(newComment);
    localStorage.setItem('v2026_comments', JSON.stringify(comments));
    
    e.target.reset();
    renderComments();
}

function renderComments() {
    const list = document.getElementById('commentsList');
    list.innerHTML = '';
    
    comments.forEach(c => {
        const card = document.createElement('div');
        card.className = 'comment-card';
        
        let displayMsg = c.original;
        let isTranslated = false;
        
        if (c.translations && c.translations[currentLang] && c.translations[currentLang] !== c.original) {
            displayMsg = c.translations[currentLang];
            isTranslated = true;
        } else if (currentLang !== 'en' && c.original !== c.translations['en']) {
            displayMsg = c.original;
        }

        card.innerHTML = `
            <div class="comment-header">
                <span class="comment-author">${c.name}</span>
                <span class="comment-country">${c.country}</span>
            </div>
            <div class="comment-body">"${displayMsg}"</div>
            ${isTranslated ? `<div class="ai-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 12 2.5 7.5"/></svg>
                ${dict[currentLang].aiTranslated}
            </div>` : ''}
        `;
        list.appendChild(card);
    });
}
